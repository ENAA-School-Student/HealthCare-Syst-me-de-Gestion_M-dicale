services:
  app:
    build: .
    ports:
      - "8080:8080"
    container_name: HealthCare-app
    restart: always
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/healthcare?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=password
    depends_on:
      - db
    networks:
      - app-network

  db:
    image: mysql:8.0
    container_name: HealthCare-db
    restart: always
    environment:
      - MYSQL_DATABASE=healthcare
      - MYSQL_USER=user
      - MYSQL_PASSWORD=password
      - MYSQL_ROOT_PASSWORD=rootpassword
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
